<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Interactive Campus Map UPI</title>

  <!-- Leaflet CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <!-- Leaflet.markercluster CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css">

  <!-- Font Awesome untuk icon -->
  <link 
    rel="stylesheet" 
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
  >

  <!-- Google Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link 
    href="https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&display=swap" 
    rel="stylesheet"
  >
  <!-- CSS khusus halaman peta -->
  <link rel="stylesheet" href="map.css" />
</head>

<body>

  <!-- TOPBAR -->
  <div class="topbar">
    <div class="topbar-left">
      <img src="images/logo.png" alt="Logo UPI">
      <h1>UPI Campus Map</h1>
    </div>

    <div class="topbar-right">
      <a href="index.html" class="topbar-btn">Beranda</a>
      <button
        class="topbar-icon topbar-locate-btn"
        id="locateMeBtn"
        onclick="locateMe()"
        title="Posisi Saya"
      >
        <i class="fa-solid fa-location-crosshairs"></i>
      </button>
      <button
        class="topbar-icon topbar-remove-loc-btn"
        id="removeLocationBtn"
        onclick="removeUserLocation()"
        title="Hapus Posisi"
        style="display:none;"
      >
        <i class="fa-solid fa-location-xmark"></i>
      </button>
      <button class="topbar-icon" onclick="resetMap()" title="Kembalikan Tampilan">
        <i class="fa-solid fa-house"></i>
      </button>
      <button class="topbar-icon" onclick="printMap()" title="Cetak">
        <i class="fa-solid fa-print"></i>
      </button>
    </div>
  </div>

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <button class="mobile-sheet-header" type="button" onclick="toggleSidebar()">
      <span id="mobileSheetAction">Sembunyikan</span>
      <strong id="mobileSheetTitle">Lokasi</strong>
      <i class="fa-solid fa-chevron-down" id="mobileSheetIcon"></i>
    </button>

    <div class="search-section">
      <div class="search-box">
        <input
          type="text"
          id="searchInput"
          placeholder="Cari nama gedung..."
          autocomplete="off"
        >
        <button onclick="searchBuilding()">
          <i class="fa-solid fa-magnifying-glass"></i>
        </button>
      </div>
      <div id="searchSuggestions" class="search-suggestions"></div>
      <div id="searchMessage" class="search-message" style="display:none;"></div>
    </div>

    <div class="sidebar-tabs">
      <button class="active" onclick="showTab('locations', this)">Lokasi</button>
      <button onclick="showTab('layers', this)">Layer</button>
      <button onclick="showTab('info', this)">Info</button>
    </div>

    <div class="sidebar-content" id="sidebarContent">
      <!-- Konten sidebar akan diisi dari JavaScript -->
    </div>

    <div class="sidebar-footer">
      <strong>Universitas Pendidikan Indonesia</strong>
      Jl. Dr. Setiabudi No. 229<br>
      Bandung, Jawa Barat
    </div>
  </aside>

  <button class="sidebar-toggle" id="sidebarToggle" onclick="toggleSidebar()">
    <i class="fa-solid fa-chevron-left" id="toggleIcon"></i>
  </button>

  <!-- MAP -->
  <div id="map"></div>

  <!-- LEGEND CONTROL -->
  <div class="map-legend" id="mapLegend">
    <button class="map-legend-toggle" onclick="toggleLegend()" title="Tampilkan/sembunyikan legenda">
      <i class="fa-solid fa-list-ul"></i>
      <span class="map-legend-toggle-text">Legenda</span>
    </button>
    <div class="map-legend-panel" id="mapLegendPanel">
      <div class="map-legend-header">
        <strong>Legenda Kategori</strong>
        <button class="map-legend-close" onclick="toggleLegend()" title="Tutup">
          <i class="fa-solid fa-xmark"></i>
        </button>
      </div>
      <div class="map-legend-items" id="mapLegendItems"></div>
    </div>
  </div>

  <!-- LOADING OVERLAY -->
  <div class="map-loading-overlay" id="mapLoadingOverlay">
    <div class="map-loading-card">
      <div class="map-loading-spinner"></div>
      <div class="map-loading-text">Memuat data kampus...</div>
    </div>
  </div>

  <!-- ERROR OVERLAY -->
  <div class="map-error-overlay" id="mapErrorOverlay" style="display:none;">
    <div class="map-error-card">
      <i class="fa-solid fa-triangle-exclamation"></i>
      <div class="map-error-title">Gagal memuat data gedung</div>
      <div class="map-error-text" id="mapErrorText">Periksa koneksi internet Anda lalu coba lagi.</div>
      <button class="map-error-retry" onclick="retryLoadBuildings()">
        <i class="fa-solid fa-rotate-right"></i> Coba Lagi
      </button>
    </div>
  </div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Leaflet.markercluster JS -->
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

  <script>
    // =====================================================
    // 1. INISIALISASI MAP
    // =====================================================
    const initialCenter = [-6.8634, 107.5943];
    const initialZoom = 17;
    const campusBounds = L.latLngBounds(
      [-6.8651, 107.5867],
      [-6.8569, 107.5971]
    );

    const map = L.map('map', {
      center: initialCenter,
      zoom: initialZoom,
      minZoom: 14,
      maxZoom: 20,
      zoomControl: false,
      maxBounds: campusBounds.pad(0.25),
      maxBoundsViscosity: 0.8
    });

    // Pindahkan zoom control ke kanan atas agar tidak bertabrakan dengan sidebar
    L.control.zoom({
      position: 'topright'
    }).addTo(map);

    // =====================================================
    // 2. BASEMAP
    // =====================================================
    const osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 20,
      maxNativeZoom: 19,
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    const satellite = L.tileLayer(
      'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', 
      {
        maxZoom: 20,
        maxNativeZoom: 19,
        attribution: 'Tiles &copy; Esri'
      }
    );

    // =====================================================
    // 3. TILE PETA KAMPUS HASIL GEOREFERENCING
    // =====================================================
    // Pastikan folder tiles Anda:
    // tiles/upi/{z}/{x}/{y}.png

    const upiCampusTile = L.tileLayer('tiles/upi/{z}/{x}/{y}.png', {
      minZoom: 14,
      maxZoom: 20,
      maxNativeZoom: 20,
      bounds: campusBounds,
      opacity: 0.95,
      tms: false
    }).addTo(map);
    
    // =====================================================
    // 4. LAYER CONTROL BAWAAN LEAFLET
    // =====================================================
    const baseMaps = {
      "OpenStreetMap": osm,
      "Satelit": satellite
    };

    const overlayMaps = {
      "Peta Kampus UPI": upiCampusTile
    };

    const layerControl = L.control.layers(baseMaps, overlayMaps, {
      position: 'topright',
      collapsed: true
    }).addTo(map);

    const parkingRenderer = L.svg({ padding: 0.4 }).addTo(map);
    const parkingLayerGroup = L.layerGroup().addTo(map);
    layerControl.addOverlay(parkingLayerGroup, "Parkiran");

    // Marker cluster group untuk gedung — kelompokkan marker yang berdekatan
    const buildingClusterGroup = L.markerClusterGroup({
      showCoverageOnHover: false,
      spiderfyOnMaxZoom: true,
      zoomToBoundsOnClick: true,
      maxClusterRadius: 45,
      disableClusteringAtZoom: 18,
      iconCreateFunction: function(cluster) {
        var count = cluster.getChildCount();
        var sizeClass = count < 10 ? "small" : count < 25 ? "medium" : "large";
        return L.divIcon({
          html: '<div class="cluster-inner"><span>' + count + '</span></div>',
          className: "upi-cluster upi-cluster-" + sizeClass,
          iconSize: L.point(40, 40)
        });
      }
    });
    map.addLayer(buildingClusterGroup);

    const evacLayerGroup = L.layerGroup();
    layerControl.addOverlay(evacLayerGroup, "🔴 Jalur Evakuasi");

    const pedestrianLayerGroup = L.layerGroup();
    layerControl.addOverlay(pedestrianLayerGroup, "🚶 Jalur Pejalan Kaki");

    // =====================================================
    // 5. DATA GEDUNG (dimuat dari GeoJSON)
    // =====================================================
    let buildings = [];

    const buildingMarkers = [];
    const parkingItems = [];
    const parkingVisibility = {
      car: true,
      motor: true
    };
    const parkingPanelState = {
      main: true,
      car: true,
      motor: true
    };

    const parkingTypeStyles = {
      car: {
        key: "car",
        label: "Parkiran Mobil",
        fillColor: "#6b7280",
        hatchColor: "#374151",
        borderColor: "#374151",
        patternId: "parking-car-hatch",
        file: "data/parkiran-mobil.geojson"
      },
      motor: {
        key: "motor",
        label: "Parkiran Motor",
        fillColor: "#facc15",
        hatchColor: "#92400e",
        borderColor: "#a16207",
        patternId: "parking-motor-hatch",
        file: "data/parkiran-motor.geojson"
      }
    };

    // =====================================================
    // 6. CUSTOM ICON MARKER BERDASARKAN KATEGORI
    // =====================================================
    const categoryIconStyles = {
      academic: {
        key: "academic",
        icon: "fa-graduation-cap",
        color: "#175b9f",
        label: "Akademik & Administrasi"
      },
      facilities: {
        key: "facilities",
        icon: "fa-building-columns",
        color: "#64748b",
        label: "Fasilitas Kampus"
      },
      housing: {
        key: "housing",
        icon: "fa-house-chimney",
        color: "#7c3aed",
        label: "Kehidupan Mahasiswa & Asrama"
      },
      mosque: {
        key: "mosque",
        icon: "fa-mosque",
        color: "#0f766e",
        label: "Ibadah"
      },
      athletics: {
        key: "athletics",
        icon: "fa-person-running",
        color: "#ea580c",
        label: "Olahraga & Rekreasi"
      },
      labschool: {
        key: "labschool",
        icon: "fa-user-graduate",
        color: "#2563eb",
        label: "Labschool UPI"
      },
      health: {
        key: "health",
        icon: "fa-stethoscope",
        color: "#dc2626",
        label: "Kesehatan"
      },
      culinary: {
        key: "culinary",
        icon: "fa-utensils",
        color: "#b45309",
        label: "Kuliner"
      },
      sanitasi: {
        key: "sanitasi",
        icon: "fa-restroom",
        color: "#0ea5e9",
        label: "Sanitasi & Toilet"
      },
      services: {
        key: "services",
        icon: "fa-copy",
        color: "#7c3aed",
        label: "Layanan Kampus"
      },
      banking: {
        key: "banking",
        icon: "fa-landmark",
        color: "#475569",
        label: "Layanan & Perbankan"
      }
    };

    const categoryDisplayOrder = [
      "academic",
      "facilities",
      "housing",
      "mosque",
      "athletics",
      "labschool",
      "health",
      "culinary",
      "sanitasi",
      "services",
      "banking"
    ];

    // Render legenda kategori (dipanggil sekali saat init)
    function renderLegendItems() {
      var container = document.getElementById("mapLegendItems");
      if (!container) return;
      var html = "";
      categoryDisplayOrder.forEach(function(key) {
        var cfg = categoryIconStyles[key];
        if (!cfg) return;
        html += `
          <div class="map-legend-item">
            <span class="map-legend-dot" style="background:${cfg.color}">
              <i class="fa-solid ${cfg.icon}"></i>
            </span>
            <span class="map-legend-label">${cfg.label}</span>
          </div>`;
      });
      container.innerHTML = html;
    }

    function toggleLegend() {
      var el = document.getElementById("mapLegend");
      if (el) el.classList.toggle("map-legend-expanded");
    }

    renderLegendItems();

    const categoryPanelState = {};
    const categoryVisibility = {};
    const activeFilters = new Set(); // filter multi-select kategori di sidebar

    function normalizeCategoryText(category, name) {
      return `${category || ""} ${name || ""}`.toLowerCase();
    }

    function getIconConfigByCategory(category, name) {
      const text = normalizeCategoryText(category, name);
      const categoryText = `${category || ""}`.toLowerCase();

      if (text.includes("sanitasi") || text.includes("toilet") || text.includes("wc") || text.includes("restroom")) {
        return categoryIconStyles.sanitasi;
      }

      if (text.includes("masjid") || text.includes("al-furqon") || text.includes("musala") || text.includes("ibadah")) {
        return categoryIconStyles.mosque;
      }

      if (text.includes("perbankan") || /\b(atm|bni|bri|mandiri)\b/.test(text) || categoryText.includes("perbankan")) {
        return categoryIconStyles.banking;
      }

      if (text.includes("fotokopi") || text.includes("print") || categoryText === "layanan") {
        return categoryIconStyles.services;
      }

      if (categoryText.includes("olahraga")) {
        return categoryIconStyles.athletics;
      }

      if (text.includes("labschool") || text.includes("laboratorium school") || text.includes("school") || text.includes("sd lab") || text.includes("smp lab") || text.includes("sma lab") || text.includes("tk lab")) {
        return categoryIconStyles.labschool;
      }

      if (text.includes("asrama") || text.includes("housing") || text.includes("student life")) {
        return categoryIconStyles.housing;
      }

      if (categoryText.includes("pendidikan")) {
        return categoryIconStyles.academic;
      }

      if (text.includes("kesehatan") || text.includes("poliklinik") || text.includes("health")) {
        return categoryIconStyles.health;
      }

      if (text.includes("kuliner") || text.includes("kantin") || text.includes("culinary")) {
        return categoryIconStyles.culinary;
      }

      if (
        text.includes("olahraga") ||
        text.includes("athletics") ||
        text.includes("stadion") ||
        text.includes("gymnasium") ||
        text.includes("sport") ||
        text.includes("lapang") ||
        text.includes("tennis") ||
        text.includes("kolam renang") ||
        text.includes("golf")
      ) {
        return categoryIconStyles.athletics;
      }

      if (
        text.includes("fasilitas") ||
        text.includes("facilities") ||
        text.includes("layanan") ||
        text.includes("services")
      ) {
        return categoryIconStyles.facilities;
      }

      return categoryIconStyles.academic;
    }

    function getCategoryIconHtml(category, name, className) {
      const iconConfig = getIconConfigByCategory(category, name);

      return `
        <span 
          class="${className}" 
          style="--marker-color: ${iconConfig.color};"
          title="${iconConfig.label}"
        >
          <i class="fa-solid ${iconConfig.icon}"></i>
        </span>
      `;
    }

    function getIconByCategory(category, name) {
      return L.divIcon({
        html: getCategoryIconHtml(category, name, "category-marker-inner"),
        className: "category-marker",
        iconSize: [30, 30],
        iconAnchor: [15, 15],
        popupAnchor: [0, -12]
      });
    }

    function getCategoryKeyByBuilding(building) {
      const text = normalizeCategoryText(building.category, building.name);

      if (text.includes("sanitasi") || text.includes("toilet") || text.includes("wc")) {
        return "sanitasi";
      }

      if (text.includes("labschool") || text.includes("laboratorium school") ||
          text.includes("sd lab") || text.includes("smp lab") || text.includes("sma lab") || text.includes("tk lab")) {
        return "labschool";
      }

      if (text.includes("perbankan") || /\b(atm|bni|bri|mandiri)\b/.test(text)) {
        return "banking";
      }

      if (text.includes("fotokopi") || text.includes("print") || `${building.category || ""}`.toLowerCase() === "layanan") {
        return "services";
      }

      return getIconConfigByCategory(building.category, building.name).key;
    }

    function getGroupedBuildings() {
      const grouped = {};

      categoryDisplayOrder.forEach(function(categoryKey) {
        grouped[categoryKey] = [];
      });

      buildings.forEach(function(building) {
        const categoryKey = getCategoryKeyByBuilding(building);

        if (!grouped[categoryKey]) {
          grouped[categoryKey] = [];
        }

        grouped[categoryKey].push(building);
      });

      return grouped;
    }

    function getVisibleCategoryKeys() {
      const grouped = getGroupedBuildings();

      return categoryDisplayOrder.filter(function(categoryKey) {
        return grouped[categoryKey] && grouped[categoryKey].length > 0;
      });
    }

    // Inisialisasi kategori dilakukan setelah GeoJSON dimuat (lihat loadBuildingsGeoJson)

    function getParkingTypeFromFeature(feature, fallbackType) {
      const properties = feature.properties || {};
      const value = `${properties.jenis_parkir || properties.jenis || properties.tipe || properties.type || properties.name || ""}`.toLowerCase();

      if (value.includes("motor")) {
        return "motor";
      }

      if (value.includes("mobil") || value.includes("car")) {
        return "car";
      }

      return fallbackType;
    }

    function getParkingTypeConfig(type) {
      return parkingTypeStyles[type] || parkingTypeStyles.car;
    }

    function injectParkingHatchPatterns() {
      const svg = parkingRenderer && parkingRenderer._container;

      if (!svg || svg.querySelector("#parking-car-hatch")) {
        return;
      }

      const defs = document.createElementNS("http://www.w3.org/2000/svg", "defs");
      defs.innerHTML = `
        <pattern id="parking-car-hatch" patternUnits="userSpaceOnUse" width="8" height="8">
          <path d="M-2,8 L8,-2 M0,10 L10,0" stroke="#374151" stroke-width="1.4" opacity="0.7"></path>
        </pattern>
        <pattern id="parking-motor-hatch" patternUnits="userSpaceOnUse" width="8" height="8">
          <path d="M-2,8 L8,-2 M0,10 L10,0" stroke="#92400e" stroke-width="1.4" opacity="0.75"></path>
        </pattern>
      `;

      svg.prepend(defs);
    }

    function getParkingBaseStyle(feature) {
      const type = getParkingTypeFromFeature(feature, "car");
      const config = getParkingTypeConfig(type);

      return {
        color: config.borderColor,
        weight: 2,
        opacity: 0.95,
        fillColor: config.fillColor,
        fillOpacity: 0.5
      };
    }

    function getParkingHatchStyle(feature) {
      const type = getParkingTypeFromFeature(feature, "car");
      const config = getParkingTypeConfig(type);

      return {
        color: "transparent",
        weight: 0,
        fillColor: `url(#${config.patternId})`,
        fillOpacity: 1,
        opacity: 1
      };
    }

    function getParkingTitle(feature, type, index) {
      const properties = feature.properties || {};
      const config = getParkingTypeConfig(type);

      return properties.nama || properties.name || `${config.label} ${properties.id || index + 1}`;
    }

    function createParkingPopupContent(item) {
      return `
        <div class="popup-card">
          <h3>${item.title}</h3>
          <span class="category">Parking & Transportation</span>
          <p>Jenis: ${item.typeConfig.label}</p>
          <p>ID: ${item.properties.id || "-"}</p>
        </div>
      `;
    }

    async function loadParkingGeoJson() {
      injectParkingHatchPatterns();

      try {
        await Promise.all([
          loadParkingType("car"),
          loadParkingType("motor")
        ]);

        renderActiveSidebarTab();
        syncParkingLayerInputs();
      } catch (error) {
        console.warn("GeoJSON parkiran gagal dimuat:", error);
      }
    }

    async function loadParkingType(type) {
      const config = getParkingTypeConfig(type);
      const response = await fetch(config.file);

      if (!response.ok) {
        throw new Error(`${config.file} tidak dapat dimuat`);
      }

      const data = await response.json();

      data.features.forEach(function(feature, index) {
        feature.properties = feature.properties || {};
        feature.properties.jenis_parkir = feature.properties.jenis_parkir || config.label;
        feature.properties.kategori = feature.properties.kategori || "Parking & Transportation";

        const detectedType = getParkingTypeFromFeature(feature, type);
        const typeConfig = getParkingTypeConfig(detectedType);
        const title = getParkingTitle(feature, detectedType, index);
        let popupLayer = null;

        const item = {
          id: `${detectedType}-${feature.properties.id || index + 1}`,
          type: detectedType,
          typeConfig: typeConfig,
          title: title,
          properties: feature.properties,
          feature: feature,
          baseLayer: null,
          hatchLayer: null,
          popupLayer: null
        };

        const baseLayer = L.geoJSON(feature, {
          renderer: parkingRenderer,
          style: getParkingBaseStyle,
          onEachFeature: function(_, layer) {
            popupLayer = layer;
            layer.bindPopup(createParkingPopupContent(item));
          }
        });

        const hatchLayer = L.geoJSON(feature, {
          renderer: parkingRenderer,
          interactive: false,
          style: getParkingHatchStyle
        });

        item.baseLayer = baseLayer;
        item.hatchLayer = hatchLayer;
        item.popupLayer = popupLayer;

        parkingLayerGroup.addLayer(baseLayer);
        parkingLayerGroup.addLayer(hatchLayer);
        parkingItems.push(item);
      });
    }

    // =====================================================
    // 7. POPUP
    // =====================================================
    function getInitials(name) {
      return (name || "?").split(" ").slice(0, 2).map(function(w) {
        return w[0] || "";
      }).join("").toUpperCase() || "?";
    }

    function shareBuilding(name, coordsOrUrl) {
      var url;
      if (typeof coordsOrUrl === "string") {
        url = coordsOrUrl;
      } else {
        url = window.location.origin + window.location.pathname + "?building=" + encodeURIComponent(name);
      }
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(url).then(function() {
          showToast("Tautan lokasi disalin!");
        }).catch(function() {
          showToast("Gagal menyalin tautan.");
        });
      } else {
        showToast("Salin: " + url);
      }
    }

    function showToast(msg) {
      var toast = document.getElementById("toastMsg");
      if (!toast) {
        toast = document.createElement("div");
        toast.id = "toastMsg";
        toast.className = "toast-notification";
        document.body.appendChild(toast);
      }
      toast.textContent = msg;
      toast.classList.add("toast-show");
      setTimeout(function() { toast.classList.remove("toast-show"); }, 3000);
    }

    // =====================================================
    // 8. LOAD GEDUNG DARI GEOJSON & TAMPILKAN MARKER
    // =====================================================
    async function loadBuildingsGeoJson() {
      try {
        const response = await fetch("data/gedung-upi-point.geojson");
        if (!response.ok) throw new Error("GeoJSON tidak dapat dimuat");
        const data = await response.json();

        buildings = data.features
          .filter(function(f) { return f.geometry && f.geometry.type === "Point"; })
          .map(function(f) {
            var p = f.properties || {};
            var coords = f.geometry.coordinates;
            return {
              name:        p.name        || p.Nama        || "Tidak diketahui",
              category:    p.category    || p.Kategori    || "Fasilitas",
              description: p.description || p.Deskripsi   || "",
              image:       p.image       || (p.Gambar ? p.Gambar + ".jpg" : "images/banner.png"),
              hours:       p.hours       || "",
              floors:      p.floors      || null,
              phone:       p.phone       || "",
              facilities:  p.facilities  || [],
              linkWeb:     p.LinkWeb     || p.linkWeb     || null,
              coords:      [coords[1], coords[0]]
            };
          });

        getVisibleCategoryKeys().forEach(function(categoryKey) {
          if (categoryPanelState[categoryKey] === undefined) {
            categoryPanelState[categoryKey] = true;
          }
          if (categoryVisibility[categoryKey] === undefined) {
            categoryVisibility[categoryKey] = true;
          }
        });

        buildings.forEach(function(building) {
          var marker = L.marker(building.coords, {
            icon: getIconByCategory(building.category, building.name)
          });

          marker.on("click", function() {
            openBuildingDetail(building.name);
          });

          marker.buildingData = building;
          marker.categoryKey = getCategoryKeyByBuilding(building);
          buildingMarkers.push(marker);
          buildingClusterGroup.addLayer(marker);
        });

        handleUrlBuildingParam();
        renderActiveSidebarTab();
        initSearchAutocomplete();

        hideMapLoading();

      } catch (err) {
        console.error("Gagal memuat data gedung:", err);
        hideMapLoading();
        showMapError(err && err.message ? err.message : "Periksa koneksi internet Anda lalu coba lagi.");
      }
    }

    function showMapLoading() {
      var ov = document.getElementById("mapLoadingOverlay");
      if (ov) ov.style.display = "flex";
    }
    function hideMapLoading() {
      var ov = document.getElementById("mapLoadingOverlay");
      if (ov) ov.style.display = "none";
    }
    function showMapError(msg) {
      var ov = document.getElementById("mapErrorOverlay");
      var txt = document.getElementById("mapErrorText");
      if (txt && msg) txt.textContent = msg;
      if (ov) ov.style.display = "flex";
    }
    function hideMapError() {
      var ov = document.getElementById("mapErrorOverlay");
      if (ov) ov.style.display = "none";
    }
    function retryLoadBuildings() {
      hideMapError();
      showMapLoading();
      // Reset state
      buildingMarkers.forEach(function(m) {
        if (buildingClusterGroup.hasLayer(m)) buildingClusterGroup.removeLayer(m);
      });
      buildingMarkers.length = 0;
      buildings = [];
      loadBuildingsGeoJson();
    }

    function handleUrlBuildingParam() {
      var params = new URLSearchParams(window.location.search);
      var buildingName = params.get("building");
      if (buildingName) {
        setTimeout(function() {
          focusBuildingByName(decodeURIComponent(buildingName));
        }, 600);
      }
    }

    // 9. SIDEBAR CONTENT
    // =====================================================

      return parkingItems.filter(function(item) {
        return item.type === type;
      });
    }

      const isVisible = parkingVisibility[type] !== false;

        return "";
      }

      let html = `
        <div class="parking-subcategory">
          <div class="parking-subcategory-header">
            <button class="category-group-main" onclick="toggleParkingSubGroup('${type}')">

                <span 
                  class="parking-swatch" 
                  style="--parking-fill: ${config.fillColor}; --parking-border: ${config.borderColor}; --parking-hatch: ${config.hatchColor};"
                ></span>
                <span>${config.label}</span>
                <span class="parking-subcategory-count">${items.length}</span>
              </span>
              <span class="category-group-actions">
                <i class="fa-solid ${isOpen ? "fa-chevron-up" : "fa-chevron-down"}"></i>
              </span>
            </button>
            <button 
              class="category-visibility-toggle ${isVisible ? "" : "is-hidden"}"
              onclick="toggleParkingVisibilityFromLocations('${type}')"
              title="${isVisible ? "Sembunyikan parkiran" : "Tampilkan parkiran"}"
            >
              <i class="fa-solid ${isVisible ? "fa-eye" : "fa-eye-slash"}"></i>
              <span>${isVisible ? "Tampil" : "Sembunyi"}</span>
            </button>
          </div>
          <div class="category-group-body ${isOpen ? "" : "collapsed"}">
      `;

      items.forEach(function(item) {
        html += `
          <div class="building-item parking-item" onclick="focusParkingItem('${item.id}')">
            <div class="building-label">
              <span 
                class="parking-swatch" 
                style="--parking-fill: ${config.fillColor}; --parking-border: ${config.borderColor}; --parking-hatch: ${config.hatchColor};"
              ></span>
              <div>
                <div>${item.title}</div>
                <div class="building-category">${config.label}</div>
              </div>
            </div>
            <i class="fa-solid fa-chevron-right"></i>
          </div>
        `;
      });

      html += `
          </div>
        </div>
      `;

      return html;
    }

    function renderParkingGroupHtml() {
      if (!parkingItems.length) {
        return `
          <div class="category-group">
            <div class="category-group-header">
              <span class="category-group-title">
                <span class="category-sidebar-icon" style="--marker-color: #475569;">
                  <i class="fa-solid fa-square-parking"></i>
                </span>
                <span>Parking & Transportation</span>
              </span>
              <span class="category-filter-count">Memuat...</span>
            </div>
          </div>
        `;
      }

      const isOpen = parkingPanelState.main !== false;
      const isVisible = parkingVisibility.car !== false || parkingVisibility.motor !== false;

      return `
        <div class="category-group">
          <div class="category-group-header">
            <button class="category-group-main" onclick="toggleParkingMainGroup()">
              <span class="category-group-title">
                <span class="category-sidebar-icon" style="--marker-color: #475569;">
                  <i class="fa-solid fa-square-parking"></i>
                </span>
                <span>Parking & Transportation</span>
                <span class="category-group-count">${parkingItems.length}</span>
              </span>
              <span class="category-group-actions">
                <i class="fa-solid ${isOpen ? "fa-chevron-up" : "fa-chevron-down"}"></i>
              </span>
            </button>
            <button

              onclick="toggleAllParkingVisibilityFromLocations()"

            >

            ${renderParkingSubGroup("motor")}

    function toggleFilter(categoryKey) {
      if (categoryKey === "all") {
        activeFilters.clear();
      } else if (activeFilters.has(categoryKey)) {
        activeFilters.delete(categoryKey);
      } else {
        activeFilters.add(categoryKey);
      }
      syncMarkersToFilter();
      renderLocations();
    }

    function syncMarkersToFilter() {
      buildingMarkers.forEach(function(marker) {
        var key = marker.categoryKey;
        var passesFilter = activeFilters.size === 0 || activeFilters.has(key);
        var categoryAllowed = categoryVisibility[key] !== false;
        if (passesFilter && categoryAllowed) {
          if (!buildingClusterGroup.hasLayer(marker)) buildingClusterGroup.addLayer(marker);
        } else {
          if (buildingClusterGroup.hasLayer(marker)) buildingClusterGroup.removeLayer(marker);
        }
      });
    }

    function renderLocations() {
      const container = document.getElementById("sidebarContent");
      const grouped = getGroupedBuildings();
      const visibleKeys = getVisibleCategoryKeys();

      // — Filter Chips bar —
      let filterHtml = `<div class="filter-chips-bar">`;
      filterHtml += `<button class="filter-chip ${activeFilters.size === 0 ? "filter-chip-active" : ""}" onclick="toggleFilter('all')">
        <i class="fa-solid fa-border-all"></i> Semua
      </button>`;
      visibleKeys.forEach(function(key) {
        var cfg = categoryIconStyles[key];
        var isActive = activeFilters.has(key);
        filterHtml += `<button
          class="filter-chip ${isActive ? "filter-chip-active" : ""}"
          style="${isActive ? "--chip-color:" + cfg.color : ""}"
          onclick="toggleFilter('${key}')"
          title="${cfg.label}"
        >
          <i class="fa-solid ${cfg.icon}"></i>
          <span>${cfg.label}</span>
        </button>`;
      });
      filterHtml += `</div>`;

      let html = filterHtml + `
        <div class="layer-group-title">
          Lokasi Gedung per Kategori
          ${activeFilters.size > 0 ? `<span class="filter-active-badge">${activeFilters.size} filter aktif</span>` : ""}
        </div>
      `;

      const keysToShow = activeFilters.size > 0
        ? visibleKeys.filter(function(k) { return activeFilters.has(k); })
        : visibleKeys;

      keysToShow.forEach(function(categoryKey) {
        const categoryConfig = categoryIconStyles[categoryKey];
        const groupBuildings = grouped[categoryKey];
        if (!groupBuildings || !groupBuildings.length) return;
        const isOpen = categoryPanelState[categoryKey] !== false;
        const isVisible = categoryVisibility[categoryKey] !== false;

        html += `
          <div class="category-group">
            <div class="category-group-header">
              <button class="category-group-main" onclick="toggleCategoryGroup('${categoryKey}')">
                <span class="category-group-title">
                  ${getCategoryIconHtml(categoryConfig.label, categoryConfig.label, "category-sidebar-icon")}
                  <span>${categoryConfig.label}</span>
                  <span class="category-group-count">${groupBuildings.length}</span>
                </span>
                <span class="category-group-actions">
                  <i class="fa-solid ${isOpen ? "fa-chevron-up" : "fa-chevron-down"}"></i>
                </span>
              </button>
              <button 
                class="category-visibility-toggle ${isVisible ? "" : "is-hidden"}" 
                onclick="toggleCategoryVisibilityFromLocations('${categoryKey}')"
                title="${isVisible ? "Sembunyikan kategori" : "Tampilkan kategori"}"
              >
                <i class="fa-solid ${isVisible ? "fa-eye" : "fa-eye-slash"}"></i>
                <span>${isVisible ? "Tampil" : "Sembunyi"}</span>
              </button>
            </div>
            <div class="category-group-body ${isOpen ? "" : "collapsed"}">
        `;

        groupBuildings.forEach(function(building) {
          html += `
            <div class="building-item" onclick="openBuildingDetail('${building.name.replace(/'/g, "\\'")}')">
              <div class="building-label">
                ${getCategoryIconHtml(building.category, building.name, "category-sidebar-icon")}
                <div>
                  <div>${building.name}</div>
                  <div class="building-category">${building.category}</div>
                </div>
              </div>
              <i class="fa-solid fa-chevron-right"></i>
            </div>
          `;
        });

        html += `
            </div>
          </div>
        `;
      });

      html += renderParkingGroupHtml();

      container.innerHTML = html;
    }

    function renderParkingLayerControls() {
      if (!parkingItems.length) {
        return "";
      }

      let html = `
        <div class="layer-group-title">Parking & Transportation</div>
        <div class="layer-item">
          <label class="layer-label">
            <input type="checkbox" id="allParkingToggle" checked onchange="toggleAllParkingLayers(this)">
            <i class="fa-solid fa-square-parking"></i>
            Semua Area Parkiran
          </label>
        </div>
      `;

      ["car", "motor"].forEach(function(type) {
        const config = getParkingTypeConfig(type);
        const items = getParkingItemsByType(type);
        const checked = parkingVisibility[type] !== false ? "checked" : "";

        if (!items.length) {
          return;
        }

        html += `
          <div class="layer-item">
            <div class="category-filter-row">
              <label>
                <input 
                  type="checkbox" 
                  data-parking-toggle="${type}"
                  ${checked}
                  onchange="toggleParkingLayer('${type}', this)"
                >
                <span 
                  class="parking-swatch" 
                  style="--parking-fill: ${config.fillColor}; --parking-border: ${config.borderColor}; --parking-hatch: ${config.hatchColor};"
                ></span>
                <span>${config.label}</span>
              </label>
              <span class="category-filter-count">${items.length}</span>
            </div>
          </div>

      return html;

      const grouped = getGroupedBuildings();
      let html = `
        <div class="layer-group-title">Kategori Marker</div>
      `;

      getVisibleCategoryKeys().forEach(function(categoryKey) {
        const categoryConfig = categoryIconStyles[categoryKey];
        const groupBuildings = grouped[categoryKey];
        const checked = categoryVisibility[categoryKey] !== false ? "checked" : "";

        html += `
          <div class="layer-item">
            <div class="category-filter-row">
              <label>
                <input 
                  type="checkbox" 
                  data-category-toggle="${categoryKey}"
                  ${checked} 
                  onchange="toggleCategoryMarkers('${categoryKey}', this)"
                >
                ${getCategoryIconHtml(categoryConfig.label, categoryConfig.label, "category-sidebar-icon")}
                <span>${categoryConfig.label}</span>
              </label>
              <span class="category-filter-count">${groupBuildings.length}</span>
            </div>
          </div>
        `;
      });

      return html;

      container.innerHTML = `

        <div class="layer-item">

    function renderInfo() {
      const container = document.getElementById("sidebarContent");

      container.innerHTML = `
        <div class="layer-group-title">Tentang WebGIS Ini</div>

        <div style="padding: 14px 16px; line-height: 1.65; color: #444; font-size: 13.5px;">
          <p style="margin:0 0 10px">

          <p style="margin:0 0 8px;font-weight:600;color:#1e293b;">Fitur tersedia:</p>

            <li>Peta kampus interaktif dengan marker kategori</li>

            Universitas Pendidikan Indonesia<br>
            Jl. Dr. Setiabudi No. 229, Bandung
          </p>
        </div>
      `;

    function renderActiveSidebarTab() {
      const activeButton = document.querySelector(".sidebar-tabs button.active");
      const activeLabel = activeButton ? activeButton.textContent.trim() : "Lokasi";

      if (activeLabel === "Layer") {
        renderLayers();
      } else if (activeLabel === "Info") {
        renderInfo();
      } else {
        renderLocations();
      }
    }

    async function loadEvacRoutes() {
      try {
        const response = await fetch("data/jalur-evakuasi.geojson");
        const data = await response.json();
        L.geoJSON(data, {
          style: {
            color: "#ef4444",
            weight: 3,
            opacity: 0.85,
            dashArray: "8, 6",
            lineJoin: "round"
          },
          onEachFeature: function(feature, layer) {
            var p = feature.properties || {};
            layer.bindTooltip(
              `<b><i class="fa-solid fa-triangle-exclamation" style="color:#ef4444"></i> ${p.name || "Jalur Evakuasi"}</b><br><span style="font-size:12px">${p.description || ""}</span>`,
              { sticky: true, className: "route-tooltip" }
            );
          }
        }).addTo(evacLayerGroup);
      } catch (e) {
        console.warn("Gagal memuat jalur evakuasi:", e);
      }
    }

    async function loadPedestrianRoutes() {
      try {
        const response = await fetch("data/jalur-pejalan-kaki.geojson");
        const data = await response.json();
        L.geoJSON(data, {
          style: {
            color: "#64748b",
            weight: 2.5,
            opacity: 0.75,
            dashArray: "4, 4",
            lineJoin: "round"
          },
          onEachFeature: function(feature, layer) {
            var p = feature.properties || {};
            layer.bindTooltip(
              `<b><i class="fa-solid fa-person-walking" style="color:#64748b"></i> ${p.name || "Jalur Pejalan Kaki"}</b><br><span style="font-size:12px">${p.description || ""}</span>`,
              { sticky: true, className: "route-tooltip" }
            );
          }
        }).addTo(pedestrianLayerGroup);
      } catch (e) {
        console.warn("Gagal memuat jalur pejalan kaki:", e);
      }
    }

    async function initApp() {
      showMapLoading();
      renderSidebarSkeleton();
      await loadBuildingsGeoJson();
      loadParkingGeoJson();
      loadEvacRoutes();
      loadPedestrianRoutes();
    }

    function renderSidebarSkeleton() {
      var container = document.getElementById("sidebarContent");
      if (!container) return;
      var rows = "";
      for (var i = 0; i < 6; i++) {
        rows += `
          <div class="skeleton-row">
            <div class="skeleton-circle"></div>
            <div class="skeleton-lines">
              <div class="skeleton-line skeleton-line-long"></div>
              <div class="skeleton-line skeleton-line-short"></div>
            </div>
          </div>`;
      }
      container.innerHTML = `<div class="skeleton-wrap">${rows}</div>`;
    }

    initApp();

    // =====================================================
    // 10. FUNGSI INTERAKSI
    // =====================================================
    function toggleCategoryGroup(categoryKey) {
      categoryPanelState[categoryKey] = categoryPanelState[categoryKey] === false;
      renderLocations();
    }

    function setCategoryVisible(categoryKey, visible) {
      categoryVisibility[categoryKey] = visible;
      syncMarkersToFilter();
    }

    function syncCategoryLayerInputs() {
      const allToggle = document.getElementById("allMarkersToggle");
      const categoryToggles = document.querySelectorAll("[data-category-toggle]");
      const visibleKeys = getVisibleCategoryKeys();

      categoryToggles.forEach(function(input) {
        const categoryKey = input.getAttribute("data-category-toggle");
        input.checked = categoryVisibility[categoryKey] !== false;
      });

      if (allToggle) {
        allToggle.checked = visibleKeys.every(function(categoryKey) {
          return categoryVisibility[categoryKey] !== false;
        });
      }
    }

    function toggleCategoryMarkers(categoryKey, checkbox) {
      setCategoryVisible(categoryKey, checkbox.checked);
      syncCategoryLayerInputs();
    }

    function toggleCategoryVisibilityFromLocations(categoryKey) {
      const nextVisible = categoryVisibility[categoryKey] === false;

      setCategoryVisible(categoryKey, nextVisible);
      syncCategoryLayerInputs();
      renderLocations();
    }

    function setParkingVisible(type, visible) {
      parkingVisibility[type] = visible;

      parkingItems.forEach(function(item) {
        if (item.type !== type) {
          return;
        }

        if (visible) {
          parkingLayerGroup.addLayer(item.baseLayer);
          parkingLayerGroup.addLayer(item.hatchLayer);
        } else {
          parkingLayerGroup.removeLayer(item.baseLayer);
          parkingLayerGroup.removeLayer(item.hatchLayer);
        }
      });
    }

    function syncParkingLayerInputs() {
      const allParkingToggle = document.getElementById("allParkingToggle");
      const parkingToggles = document.querySelectorAll("[data-parking-toggle]");

      parkingToggles.forEach(function(input) {
        const type = input.getAttribute("data-parking-toggle");
        input.checked = parkingVisibility[type] !== false;
      });

      if (allParkingToggle) {
        allParkingToggle.checked = parkingVisibility.car !== false && parkingVisibility.motor !== false;
      }
    }

    function toggleParkingMainGroup() {
      parkingPanelState.main = parkingPanelState.main === false;
      renderLocations();
    }

    function toggleParkingSubGroup(type) {
      parkingPanelState[type] = parkingPanelState[type] === false;
      renderLocations();
    }

    function toggleParkingVisibilityFromLocations(type) {
      const nextVisible = parkingVisibility[type] === false;

      setParkingVisible(type, nextVisible);
      syncParkingLayerInputs();
      renderLocations();
    }

    function toggleAllParkingVisibilityFromLocations() {
      const nextVisible = parkingVisibility.car === false && parkingVisibility.motor === false;

      setParkingVisible("car", nextVisible);
      setParkingVisible("motor", nextVisible);
      syncParkingLayerInputs();
      renderLocations();
    }

    function toggleParkingLayer(type, checkbox) {
      setParkingVisible(type, checkbox.checked);
      syncParkingLayerInputs();
    }

    function toggleAllParkingLayers(checkbox) {
      setParkingVisible("car", checkbox.checked);
      setParkingVisible("motor", checkbox.checked);
      syncParkingLayerInputs();
    }

    function focusParkingItem(itemId) {
      const item = parkingItems.find(function(parkingItem) {
        return parkingItem.id === itemId;
      });

      if (!item || !item.popupLayer) {
        return;
      }

      if (parkingVisibility[item.type] === false) {
        setParkingVisible(item.type, true);
        syncParkingLayerInputs();
        renderLocations();
      }

      if (!map.hasLayer(parkingLayerGroup)) {
        parkingLayerGroup.addTo(map);
      }

      const bounds = item.popupLayer.getBounds();
      map.fitBounds(bounds, {
        padding: [40, 40],
        maxZoom: 20
      });
      item.popupLayer.openPopup(bounds.getCenter());

      if (window.innerWidth <= 700) {
        closeSidebar();
      }
    }

    function showCategoryForMarker(marker) {
      if (marker && categoryVisibility[marker.categoryKey] === false) {
        setCategoryVisible(marker.categoryKey, true);
        syncCategoryLayerInputs();
      }
    }

    function focusBuildingByName(name) {
      var marker = buildingMarkers.find(function(item) {
        return item.buildingData.name === name;
      });

      if (marker) {
        showCategoryForMarker(marker);
        map.flyTo(marker.getLatLng(), 19, { duration: 0.8 });
        setTimeout(function() {
          highlightMarker(marker);
        }, 850);
      }
    }

    function openBuildingDetail(name) {
      var building = buildings.find(function(b) { return b.name === name; });
      if (!building) return;

      var marker = buildingMarkers.find(function(m) { return m.buildingData.name === name; });
      if (marker) {
        showCategoryForMarker(marker);
        map.flyTo(marker.getLatLng(), 19, { duration: 0.8 });
        setTimeout(function() { highlightMarker(marker); }, 850);
      }

      // Mobile: buka sidebar agar detail terlihat
      if (window.innerWidth <= 700) {
        var sidebar = document.getElementById("sidebar");
        if (sidebar.classList.contains("closed")) {
          sidebar.classList.remove("closed");
          updateSidebarChrome();
          setTimeout(function() { map.invalidateSize(); }, 300);
        }
      }

      renderBuildingDetail(building);
    }

    function renderBuildingDetail(building) {
      var container = document.getElementById("sidebarContent");
      var iconConfig = getIconConfigByCategory(building.category, building.name);
      var safeName = building.name.replace(/'/g, "\\'");
      var coords = building.coords;

      var imgSrc = building.image || "images/banner.png";
      var initials = getInitials(building.name);
      var badgeColor = iconConfig ? iconConfig.color : "#6b7280";
      var badgeLabel = iconConfig ? iconConfig.label : building.category;
      var badgeIcon  = iconConfig ? iconConfig.icon : "fa-building";

      // Info rows
      var infoRows = "";
      if (building.hours) {
        infoRows += `<div class="detail-info-row"><i class="fa-regular fa-clock"></i><span>${building.hours}</span></div>`;
      }
      if (building.floors) {
        infoRows += `<div class="detail-info-row"><i class="fa-solid fa-layer-group"></i><span>${building.floors} lantai</span></div>`;
      }
      if (building.phone) {
        infoRows += `<div class="detail-info-row"><i class="fa-solid fa-phone"></i><a href="tel:${building.phone}">${building.phone}</a></div>`;
      }

      // Facilities chips
      var facilitiesHtml = "";
      if (building.facilities && building.facilities.length > 0) {
        var chips = building.facilities.map(function(f) {
          return `<span class="detail-facility-chip">${f}</span>`;
        }).join("");
        facilitiesHtml = `
          <div class="detail-section">
            <div class="detail-section-title"><i class="fa-solid fa-list-check"></i> Fasilitas</div>
            <div class="detail-facilities">${chips}</div>
          </div>`;
      }

      container.innerHTML = `
        <div class="building-detail-panel">
          <button class="detail-back-btn" onclick="showTab('locations', document.querySelector('.sidebar-tabs button'))">
            <i class="fa-solid fa-arrow-left"></i> Kembali ke Daftar
          </button>

          <div class="detail-img-wrap">
            <img src="${imgSrc}" alt="${building.name}"
              onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">
            <div class="detail-img-fallback" style="display:none;background:${badgeColor}22;color:${badgeColor};">
              ${initials}
            </div>
          </div>

          <div class="detail-body">
            <span class="detail-category-badge" style="background:${badgeColor}18;color:${badgeColor};border:1px solid ${badgeColor}40;">
              <i class="fa-solid ${badgeIcon}"></i> ${badgeLabel}
            </span>

            <h2 class="detail-building-name">${building.name}</h2>

            ${building.description ? `<p class="detail-description">${building.description}</p>` : ""}

            ${infoRows ? `<div class="detail-info-section">${infoRows}</div>` : ""}

            ${facilitiesHtml}

            <div class="detail-actions">
              ${building.linkWeb ? `
              <a class="detail-btn detail-btn-website" href="${building.linkWeb}" target="_blank" rel="noopener">
                <i class="fa-solid fa-arrow-up-right-from-square"></i> Kunjungi Website
              </a>` : ""}
              <button class="detail-btn detail-btn-share" onclick="shareBuilding('${safeName}', [${coords[0]},${coords[1]}])">
                <i class="fa-solid fa-share-nodes"></i> Bagikan Lokasi
              </button>
            </div>
          </div>
        </div>
      `;

      // Tandai tab Lokasi sebagai aktif
      document.querySelectorAll(".sidebar-tabs button").forEach(function(btn) {
        btn.classList.toggle("active", btn.textContent.trim() === "Lokasi");
      });
    }

    // =====================================================
    // SEARCH BAR — autocomplete + flyTo + pulse
    // =====================================================
    function hideSuggestions() {
      var el = document.getElementById("searchSuggestions");
      if (el) { el.innerHTML = ""; el.style.display = "none"; }
    }

    function showSearchMessage(text, type) {
      var msg = document.getElementById("searchMessage");
      if (!msg) return;
      msg.textContent = text;
      msg.className = "search-message search-message-" + type;
      msg.style.display = "block";
      clearTimeout(msg._hideTimer);
      msg._hideTimer = setTimeout(function() { msg.style.display = "none"; }, 4000);
    }

    function hideSearchMessage() {
      var msg = document.getElementById("searchMessage");
      if (msg) msg.style.display = "none";
    }

    function highlightMarker(marker) {
      var el = marker._icon;
      if (!el) return;
      el.classList.add("marker-pulse");
      setTimeout(function() { el.classList.remove("marker-pulse"); }, 2000);
    }

    function initSearchAutocomplete() {
      var input = document.getElementById("searchInput");
      var suggestions = document.getElementById("searchSuggestions");
      if (!input || !suggestions) return;

      input.addEventListener("input", function() {
        var keyword = this.value.toLowerCase().trim();
        if (!keyword || keyword.length < 2) { hideSuggestions(); return; }

        var matches = buildings.filter(function(b) {
          return b.name.toLowerCase().includes(keyword);
        }).slice(0, 7);

        if (!matches.length) { hideSuggestions(); return; }

        suggestions.innerHTML = matches.map(function(b) {
          var iconConfig = getIconConfigByCategory(b.category, b.name);
          var safeName = b.name.replace(/'/g, "\\'");
          return `<div class="search-suggestion-item" onclick="selectSuggestion('${safeName}')">
            <span class="suggestion-icon" style="background:${iconConfig.color}">
              <i class="fa-solid ${iconConfig.icon}"></i>
            </span>
            <div class="suggestion-text">
              <div class="suggestion-name">${b.name}</div>
              <div class="suggestion-cat">${b.category}</div>
            </div>
          </div>`;
        }).join("");
        suggestions.style.display = "block";
      });

      document.addEventListener("click", function(e) {
        if (!e.target.closest(".search-section")) hideSuggestions();
      });
    }

    function selectSuggestion(name) {
      document.getElementById("searchInput").value = name;
      hideSuggestions();
      hideSearchMessage();
      focusBuildingByName(name);
    }

    function searchBuilding() {
      var keyword = document.getElementById("searchInput").value.toLowerCase().trim();
      hideSuggestions();

      if (!keyword) {
        showSearchMessage("Masukkan nama gedung terlebih dahulu.", "warning");
        return;
      }

      var result = buildingMarkers.find(function(marker) {
        return marker.buildingData.name.toLowerCase().includes(keyword);
      });

      if (result) {
        hideSearchMessage();
        openBuildingDetail(result.buildingData.name);
      } else {
        showSearchMessage("Gedung tidak ditemukan. Coba kata kunci lain.", "error");
      }
    }

    document.getElementById("searchInput").addEventListener("keyup", function(e) {
      if (e.key === "Enter") searchBuilding();
    });

    // =====================================================
    // GEOLOCATION — "Posisi Saya"
    // =====================================================
    var userLocationMarker = null;
    var userAccuracyCircle = null;

    function locateMe() {
      if (!navigator.geolocation) {
        showToast("Browser tidak mendukung geolokasi.");
        return;
      }

      var btn = document.getElementById("locateMeBtn");
      if (btn) { btn.disabled = true; btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>'; }

      navigator.geolocation.getCurrentPosition(
        function(pos) {
          var lat = pos.coords.latitude;
          var lng = pos.coords.longitude;
          var accuracy = pos.coords.accuracy;

          if (userLocationMarker) {
            map.removeLayer(userLocationMarker);
            map.removeLayer(userAccuracyCircle);
          }

          var userIcon = L.divIcon({
            html: '<span class="user-location-dot"></span>',
            className: "",
            iconSize: [22, 22],
            iconAnchor: [11, 11]
          });

          userLocationMarker = L.marker([lat, lng], { icon: userIcon })
            .bindPopup("<b>Posisi Anda</b><br>Akurasi: ~" + Math.round(accuracy) + " meter")
            .addTo(map);

          userAccuracyCircle = L.circle([lat, lng], {
            radius: accuracy,
            color: "#2563eb",
            fillColor: "#3b82f6",
            fillOpacity: 0.12,
            weight: 2
          }).addTo(map);

          map.flyTo([lat, lng], 18, { duration: 1.2 });
          userLocationMarker.openPopup();

          if (!campusBounds.contains([lat, lng])) {
            setTimeout(function() {
              showToast("Kamu sedang berada di luar area kampus UPI.");
            }, 1300);
          }

          var removeBtn = document.getElementById("removeLocationBtn");
          if (removeBtn) removeBtn.style.display = "inline-flex";
          if (btn) { btn.disabled = false; btn.innerHTML = '<i class="fa-solid fa-location-crosshairs"></i>'; }
        },
        function(err) {
          console.warn("Geolokasi gagal:", err.message);
          showToast("Gagal mendapatkan lokasi. Pastikan izin lokasi diberikan.");
          if (btn) { btn.disabled = false; btn.innerHTML = '<i class="fa-solid fa-location-crosshairs"></i>'; }
        },
        { enableHighAccuracy: true, timeout: 10000 }
      );
    }

    function removeUserLocation() {
      if (userLocationMarker) { map.removeLayer(userLocationMarker); userLocationMarker = null; }
      if (userAccuracyCircle) { map.removeLayer(userAccuracyCircle); userAccuracyCircle = null; }
      var removeBtn = document.getElementById("removeLocationBtn");
      if (removeBtn) removeBtn.style.display = "none";
    }

    function resetMap() {
      map.setView(initialCenter, initialZoom);
    }

    function printMap() {
      window.print();
    }

    function toggleCampusTile(checkbox) {
      if (checkbox.checked) {
        upiCampusTile.addTo(map);
      } else {
        map.removeLayer(upiCampusTile);
      }
    }

    function toggleBuildingMarkers(checkbox) {
      getVisibleCategoryKeys().forEach(function(categoryKey) {
        setCategoryVisible(categoryKey, checkbox.checked);
      });

      syncCategoryLayerInputs();
    }

    function setCampusOpacity(value) {
      upiCampusTile.setOpacity(parseFloat(value));
    }

    function showTab(tabName, button) {
      const buttons = document.querySelectorAll(".sidebar-tabs button");

      buttons.forEach(function(btn) {
        btn.classList.remove("active");
      });

      button.classList.add("active");
      updateMobileSheetTitle(button.textContent.trim());

      if (tabName === "locations") {
        renderLocations();
      } else if (tabName === "layers") {
        renderLayers();
      } else if (tabName === "info") {
        renderInfo();
      }
    }

    function isMobileLayout() {
      return window.matchMedia("(max-width: 700px)").matches;
    }

    function updateMobileSheetTitle(title) {
      const sheetTitle = document.getElementById("mobileSheetTitle");

      if (sheetTitle && title) {
        sheetTitle.textContent = title;
      }
    }

    function updateSidebarChrome() {
      const sidebar = document.getElementById("sidebar");
      const desktopIcon = document.getElementById("toggleIcon");
      const sheetAction = document.getElementById("mobileSheetAction");
      const sheetIcon = document.getElementById("mobileSheetIcon");
      const isClosed = sidebar.classList.contains("closed");

      if (desktopIcon) {
        if (isMobileLayout()) {
          desktopIcon.className = isClosed ? "fa-solid fa-chevron-up" : "fa-solid fa-chevron-down";
        } else {
          desktopIcon.className = isClosed ? "fa-solid fa-chevron-right" : "fa-solid fa-chevron-left";
        }
      }

      if (sheetAction) {
        sheetAction.textContent = isClosed ? "Tampilkan" : "Sembunyikan";
      }

      if (sheetIcon) {
        sheetIcon.className = isClosed ? "fa-solid fa-chevron-up" : "fa-solid fa-chevron-down";
      }
    }

    function toggleSidebar() {
      const sidebar = document.getElementById("sidebar");

      sidebar.classList.toggle("closed");
      updateSidebarChrome();

      setTimeout(function() {
        map.invalidateSize();
      }, 300);
    }

    function closeSidebar() {
      const sidebar = document.getElementById("sidebar");

      sidebar.classList.add("closed");
      updateSidebarChrome();

      setTimeout(function() {
        map.invalidateSize();
      }, 300);
    }

    window.addEventListener("resize", function() {
      updateSidebarChrome();
      map.invalidateSize();
    });

    updateSidebarChrome();
  </script>

</body>
</html>
